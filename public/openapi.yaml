openapi: 3.0.3
info:
  title: IC Dashboard API
  description: |
    API specification for the Yuanta IC Agent Portal dashboard.
    Covers client data, NBA actions, pipeline deals, and kanban board.
  version: 1.0.0
  contact:
    name: Yuanta Dev Team


tags:
  - name: Clients
    description: Wealth management client profiles
  - name: NBA Actions
    description: Next Best Action recommendations generated by AI
  - name: Pipeline Deals
    description: Sales pipeline and deal tracking
  - name: Mini Kanban
    description: Simplified kanban board for deal stages

paths:
  /clients:
    get:
      tags: [Clients]
      summary: List all clients
      parameters:
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Page'
      responses:
        '200':
          description: List of clients
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientList'
    post:
      tags: [Clients]
      summary: Create a new client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientInput'
      responses:
        '201':
          description: Client created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientSingle'
        '400':
          $ref: '#/components/responses/BadRequest'

  /clients/{id}:
    get:
      tags: [Clients]
      summary: Get a single client
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Client detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientSingle'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Clients]
      summary: Update a client
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientInput'
      responses:
        '200':
          description: Client updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientSingle'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Clients]
      summary: Delete a client
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Client deleted
        '404':
          $ref: '#/components/responses/NotFound'

  /nba-actions:
    get:
      tags: [NBA Actions]
      summary: List all NBA actions
      parameters:
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Page'
      responses:
        '200':
          description: List of NBA actions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NBAActionList'
    post:
      tags: [NBA Actions]
      summary: Create a new NBA action
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NBAActionInput'
      responses:
        '201':
          description: NBA action created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NBAActionSingle'
        '400':
          $ref: '#/components/responses/BadRequest'

  /nba-actions/{id}:
    get:
      tags: [NBA Actions]
      summary: Get a single NBA action
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: NBA action detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NBAActionSingle'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [NBA Actions]
      summary: Update an NBA action
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NBAActionInput'
      responses:
        '200':
          description: NBA action updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NBAActionSingle'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [NBA Actions]
      summary: Delete an NBA action
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: NBA action deleted
        '404':
          $ref: '#/components/responses/NotFound'

  /pipeline-deals:
    get:
      tags: [Pipeline Deals]
      summary: List all pipeline deals
      parameters:
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Page'
      responses:
        '200':
          description: List of pipeline deals
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineDealList'
    post:
      tags: [Pipeline Deals]
      summary: Create a new pipeline deal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PipelineDealInput'
      responses:
        '201':
          description: Pipeline deal created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineDealSingle'
        '400':
          $ref: '#/components/responses/BadRequest'

  /pipeline-deals/{id}:
    get:
      tags: [Pipeline Deals]
      summary: Get a single pipeline deal
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Pipeline deal detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineDealSingle'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Pipeline Deals]
      summary: Update a pipeline deal
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PipelineDealInput'
      responses:
        '200':
          description: Pipeline deal updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineDealSingle'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Pipeline Deals]
      summary: Delete a pipeline deal
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Pipeline deal deleted
        '404':
          $ref: '#/components/responses/NotFound'

  /mini-kanbans:
    get:
      tags: [Mini Kanban]
      summary: List all kanban items
      parameters:
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Page'
      responses:
        '200':
          description: List of kanban items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MiniKanbanList'
    post:
      tags: [Mini Kanban]
      summary: Create a new kanban item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MiniKanbanInput'
      responses:
        '201':
          description: Kanban item created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MiniKanbanSingle'
        '400':
          $ref: '#/components/responses/BadRequest'

  /mini-kanbans/{id}:
    get:
      tags: [Mini Kanban]
      summary: Get a single kanban item
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Kanban item detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MiniKanbanSingle'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Mini Kanban]
      summary: Update a kanban item
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MiniKanbanInput'
      responses:
        '200':
          description: Kanban item updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MiniKanbanSingle'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Mini Kanban]
      summary: Delete a kanban item
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Kanban item deleted
        '404':
          $ref: '#/components/responses/NotFound'

components:
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
      example: "1"
    PageSize:
      name: pagination[pageSize]
      in: query
      schema:
        type: integer
        default: 25
        maximum: 100
    Page:
      name: pagination[page]
      in: query
      schema:
        type: integer
        default: 1

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: object
                properties:
                  status: { type: integer, example: 404 }
                  message: { type: string, example: Not Found }
    BadRequest:
      description: Invalid request body
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: object
                properties:
                  status: { type: integer, example: 400 }
                  message: { type: string, example: Bad Request }

  schemas:
    Pagination:
      type: object
      properties:
        page: { type: integer, example: 1 }
        pageSize: { type: integer, example: 25 }
        pageCount: { type: integer, example: 1 }
        total: { type: integer, example: 8 }

    # ── Client ────────────────────────────────────────────────────────────────

    Client:
      type: object
      required: [id, name, tier, aum, cashIdlePct, plYtd, plPositive, aiScore, status, lastContact, riskProfile]
      properties:
        id:
          type: integer
          description: Auto-incremented Strapi ID
          example: 1
        documentId:
          type: string
          description: Strapi 5 stable document identifier
          example: "himitut0frxfli283ojm1mr9"
        name:
          type: string
          example: Somchai Rattanakul
        tier:
          type: string
          enum: [UHNW, HNW]
          example: UHNW
        aum:
          type: string
          description: Assets under management (formatted string with ฿ symbol)
          example: "฿ 450M"
        cashIdlePct:
          type: integer
          minimum: 0
          maximum: 100
          description: Percentage of portfolio sitting as idle cash
          example: 18
        plYtd:
          type: string
          description: Year-to-date P&L as formatted string
          example: "+12.4%"
        plPositive:
          type: boolean
          description: True if YTD P&L is positive
          example: true
        aiScore:
          type: integer
          minimum: 0
          maximum: 100
          description: AI engagement/opportunity score
          example: 94
        status:
          type: string
          enum: [success, error, hold, processing]
          description: >
            Client portfolio health status:
            success = healthy, error = urgent action needed,
            hold = needs attention, processing = in progress
          example: success
        lastContact:
          type: string
          description: Human-readable time since last contact
          example: "2 days ago"
        riskProfile:
          type: string
          enum: [Aggressive, Moderate, Conservative]
          example: Aggressive

    ClientList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Client'
        meta:
          type: object
          properties:
            pagination:
              $ref: '#/components/schemas/Pagination'

    ClientSingle:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Client'

    # ── NBA Action ────────────────────────────────────────────────────────────

    NBAAction:
      type: object
      required: [id, clientId, tier, priority, priorityVariant, insight, aiDraft, action, revenueImpact]
      properties:
        id:
          type: integer
          example: 1
        documentId:
          type: string
          example: "abc123"
        clientId:
          type: string
          description: References the id field of the Client resource
          example: "1"
        tier:
          type: string
          enum: [UHNW, HNW]
          example: UHNW
        priority:
          type: string
          enum: [HIGH, MEDIUM, LOW]
          example: HIGH
        priorityVariant:
          type: string
          enum: [red, yellow, blue]
          description: UI color variant matching priority level
          example: red
        insight:
          type: string
          description: AI-generated insight explaining why this action is recommended
          example: "฿ 81M idle cash (18% of portfolio) — underperforming by 220bps vs target allocation."
        aiDraft:
          type: string
          description: AI-drafted message ready to send to the client (Thai language)
          example: "คุณสมชาย สวัสดีครับ ผมสังเกตว่าพอร์ตของคุณมีเงินสด 18%..."
        action:
          type: string
          description: Recommended action label for the RM
          example: "Review & Send"
        revenueImpact:
          type: string
          description: Estimated revenue impact or compliance label
          example: "฿ 2.4M est. revenue"

    NBAActionList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/NBAAction'
        meta:
          type: object
          properties:
            pagination:
              $ref: '#/components/schemas/Pagination'

    NBAActionSingle:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/NBAAction'

    # ── Pipeline Deal ─────────────────────────────────────────────────────────

    PipelineDeal:
      type: object
      required: [id, clientId, product, dealSize, probability, stage, daysInStage, stalled]
      properties:
        id:
          type: integer
          example: 1
        documentId:
          type: string
          example: "abc123"
        clientId:
          type: string
          description: References the id field of the Client resource
          example: "1"
        product:
          type: string
          example: Structured Note
        dealSize:
          type: string
          description: Deal size as formatted string
          example: "฿ 50M"
        probability:
          type: integer
          minimum: 0
          maximum: 100
          description: Win probability percentage
          example: 85
        stage:
          type: string
          enum: [Qualified, Proposed, Under Review, Negotiation, Closed Won, Closed Lost]
          example: Proposed
        daysInStage:
          type: integer
          minimum: 0
          description: Number of days the deal has been in the current stage
          example: 5
        stalled:
          type: boolean
          description: True if deal has been in the same stage for too long
          example: false

    PipelineDealList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/PipelineDeal'
        meta:
          type: object
          properties:
            pagination:
              $ref: '#/components/schemas/Pagination'

    PipelineDealSingle:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/PipelineDeal'

    # ── Mini Kanban ───────────────────────────────────────────────────────────

    MiniKanban:
      type: object
      required: [id, clientId, deal, stage]
      properties:
        id:
          type: integer
          example: 1
        documentId:
          type: string
          example: "abc123"
        clientId:
          type: string
          description: References the id field of the Client resource
          example: "1"
        deal:
          type: string
          description: Deal description including product and size
          example: "Structured Note ฿50M"
        stage:
          type: string
          enum: [Idea, Pitch, Client Review, Executed]
          example: Pitch

    MiniKanbanList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/MiniKanban'
        meta:
          type: object
          properties:
            pagination:
              $ref: '#/components/schemas/Pagination'

    MiniKanbanSingle:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/MiniKanban'

    # ── Input schemas (POST / PUT request bodies — no id field) ──────────────

    ClientInput:
      type: object
      required: [name, tier, aum, cashIdlePct, plYtd, plPositive, aiScore, status, lastContact, riskProfile]
      properties:
        name:          { type: string, example: Somchai Rattanakul }
        tier:          { type: string, enum: [UHNW, HNW] }
        aum:           { type: string, example: "฿ 450M" }
        cashIdlePct:   { type: integer, minimum: 0, maximum: 100, example: 18 }
        plYtd:         { type: string, example: "+12.4%" }
        plPositive:    { type: boolean, example: true }
        aiScore:       { type: integer, minimum: 0, maximum: 100, example: 94 }
        status:        { type: string, enum: [success, error, hold, processing] }
        lastContact:   { type: string, example: "2 days ago" }
        riskProfile:   { type: string, enum: [Aggressive, Moderate, Conservative] }

    NBAActionInput:
      type: object
      required: [clientId, tier, priority, priorityVariant, insight, aiDraft, action, revenueImpact]
      properties:
        clientId:        { type: string, example: "1" }
        tier:            { type: string, enum: [UHNW, HNW] }
        priority:        { type: string, enum: [HIGH, MEDIUM, LOW] }
        priorityVariant: { type: string, enum: [red, yellow, blue] }
        insight:         { type: string }
        aiDraft:         { type: string }
        action:          { type: string, example: "Review & Send" }
        revenueImpact:   { type: string, example: "฿ 2.4M est. revenue" }

    PipelineDealInput:
      type: object
      required: [clientId, product, dealSize, probability, stage, daysInStage, stalled]
      properties:
        clientId:    { type: string, example: "1" }
        product:     { type: string, example: Structured Note }
        dealSize:    { type: string, example: "฿ 50M" }
        probability: { type: integer, minimum: 0, maximum: 100, example: 85 }
        stage:       { type: string, enum: [Qualified, Proposed, Under Review, Negotiation, Closed Won, Closed Lost] }
        daysInStage: { type: integer, minimum: 0, example: 5 }
        stalled:     { type: boolean, example: false }

    MiniKanbanInput:
      type: object
      required: [clientId, deal, stage]
      properties:
        clientId: { type: string, example: "1" }
        deal:     { type: string, example: "Structured Note ฿50M" }
        stage:    { type: string, enum: [Idea, Pitch, Client Review, Executed] }
